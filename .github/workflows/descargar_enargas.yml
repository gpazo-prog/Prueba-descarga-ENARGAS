name: Descargar Estadísticas ENARGAS
on:
  workflow_dispatch:

jobs:
  descargar-excel:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: pip install selenium webdriver-manager
      - name: Instalar Xvfb y Libs
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libnss3 libatk-bridge2.0-0 libxcomposite1 libxdamage1 libxrandr2 libgbm1 libasound2t64
      - name: Ejecutar con Xvfb
        run: |
          mkdir -p descargas_gnc
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" python script_enargas.py
      - uses: actions/upload-artifact@v4
        with:
          name: Archivos-GNC
          path: descargas_gnc/*.xls
